name: Update Homepage News

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * 1"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update news data
        run: python scripts/update_news.py

      - name: Commit changes
        run: |
          if git diff --quiet -- _data/news.yml; then
            echo "No news updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/news.yml
          git commit -m "Update homepage news"
          git push
